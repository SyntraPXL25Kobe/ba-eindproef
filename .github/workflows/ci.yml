name: CI

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

permissions:
  contents: write

jobs:
  lint-and-format:
    name: Lint & Format (PHP & Frontend)
    runs-on: ubuntu-latest
    steps:
      # Zorg dat we altijd de juiste HEAD ref uitchecken, zeker bij PR's
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      # 1. PHP Linting & Fiksen
      - name: Run Pint
        run: composer lint

      - name: Generate Wayfinder Types
        run: php artisan wayfinder:generate --with-form

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci

      # 2. Frontend Linting, Formatting & Typechecking
      - name: Format Frontend
        run: npm run format

      - name: Lint Frontend
        run: npm run lint

      - name: Typecheck Frontend
        run: npm run types:check

      # 3. Één gecombineerde commit voor alle fixes (als die er zijn)
      - name: Commit fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'fix: code style (pint/prettier/eslint)'
          commit_options: '--no-verify'
